      leaves:
        - id: 1
          name: "init via inMemory transport returns live backend"
          given: "JsonRpcTransport.inMemory pair; LaunchConfig(requestTimeout=5.seconds); fake server replies Browser.getVersion -> BrowserVersionResult"
          when: "CdpBackend.initUnscoped returns"
          then: "backend.endpoint non-null; backend.sessionId == Absent; backend.dialogHandlers.get is empty Dict; probe returned successfully"
          pins: "INV-016, INV-017, Phase-01 init contract"
        - id: 2
          name: "init fails fast with BrowserSetupException when probe returns Closed"
          given: "inMemory pair whose receive-side immediately closes on probe call"
          when: "CdpBackend.initUnscoped runs"
          then: "aborts with BrowserSetupException('WS handshake failed: ...')"
          pins: "INV-016 (Q-002 ratification)"
        - id: 3
          name: "send writes wire bytes that match legacy CDP envelope shape"
          given: "live in-memory backend; fake server echoing back {id, result}"
          when: "backend.send[NavigateParams, NavigateResult]('Page.navigate', params) invoked"
          then: "outbound envelope decoded by JsonRpcCodec.Cdp is JsonRpcEnvelope.Request(id, 'Page.navigate', Present(<params>), Absent) ; no jsonrpc field, no extras for non-session call"
          pins: "INV-015 (no-session default), INV-011 (codec-driven)"
        - id: 4
          name: "session-scoped backend stamps sessionId via ExtrasEncoder"
          given: "live backend, tabBackend = backend.withSession(SessionId('abc')), fake echo server"
          when: "tabBackend.send[NavigateParams, NavigateResult]('Page.navigate', params)"
          then: "outbound envelope extras = Record(('sessionId' -> Str('abc'))); wire shape {id,method,params,sessionId:'abc'}"
          pins: "INV-015"
        - id: 5
          name: "Page.javascriptDialogOpening routes via ctx.extras to per-session handler"
          given: "live backend; dialog handler registered for SessionId('s1') -> (true, 'ok'); recorder ref attached"
          when: "server pushes Page.javascriptDialogOpening notification with sessionId=s1"
          then: "within 200ms: dialogQueue contains (true, 'ok', Present(SessionId('s1'))); recorder ref contains DialogEvent('alert', 'hi', true, 'ok')"
          pins: "INV-015, Phase-01 dialog routing"
        - id: 6
          name: "Page.javascriptDialogOpening auto-dismisses when no handler registered"
          given: "live backend; empty dialogHandlers; server pushes notification with sessionId='unknown'"
          when: "100ms elapses"
          then: "dialogQueue contains exactly one (false, '', Present(SessionId('unknown')))"
          pins: "design §13 risks: auto-dismiss test-stability invariant"
        - id: 7
          name: "Runtime.executionContextCreated routes via ctx.extras to frame-event dispatcher"
          given: "live backend; frame handler registered for SessionId('frame1') capturing all events"
          when: "server pushes Runtime.executionContextCreated twice with sessionId=frame1"
          then: "capture ref holds exactly two CdpEvent.Generic('Runtime.executionContextCreated', _, Present(SessionId('frame1'))) entries"
          pins: "INV-015"
        - id: 8
          name: "Page.downloadWillBegin routes via ctx.extras to download-event dispatcher"
          given: "live backend; download handler registered for SessionId('dl')"
          when: "server pushes Page.downloadWillBegin with sessionId=dl"
          then: "capture ref holds one CdpEvent.Generic('Page.downloadWillBegin', _, Present(SessionId('dl')))"
          pins: "INV-015"
        - id: 9
          name: "close(gracePeriod) sequences endpoint.close, dialogQueue.close, dialogDrainer.interrupt"
          given: "live backend; one inflight send; registered dialog handler; non-empty dialogQueue"
          when: "backend.close(2.seconds) runs"
          then: "endpoint.awaitDrain returns; dialogQueue.isClosed; dialogDrainer.done; no leaks"
          pins: "Phase-01 close-ordering contract"
        - id: 10
          name: "dialog drainer issues sendUnmatched with negative JsonRpcId.Num"
          given: "live backend; enqueued (true, 'answer', Present(SessionId('s')))"
          when: "drainer dequeues and writes"
          then: "outbound envelope = Request(JsonRpcId.Num(neg), 'Page.handleJavaScriptDialog', params, sessionId extras); neg == Int.MinValue.toLong (negative); SequentialInt allocator not consulted (sendUnmatched is caller-id)"
          pins: "INV-018"
