// gRPC - Hello World Protocol Buffer Definition
// This is an example protocol buffer for the kyo-grpc module

syntax = "proto3";

package helloworld;

// The greeting service definition.
service Greeter {
    // Sends a greeting
    rpc SayHello (HelloRequest) returns (HelloReply) {}
    
    // Sends a greeting with server streaming
    rpc SayHelloServerStream (HelloRequest) returns (stream HelloReply) {}
    
    // Sends a greeting with client streaming
    rpc SayHelloClientStream (stream HelloRequest) returns (HelloReply) {}
    
    // Sends a greeting with bidirectional streaming
    rpc SayHelloBidirectionalStream (stream HelloRequest) returns (stream HelloReply) {}
}

// The request message containing the user's name.
message HelloRequest {
    string name = 1;
    int32 age = 2;
    map<string, string> metadata = 3;
}

// The response message containing the greetings.
message HelloReply {
    string message = 1;
    repeated string greetings = 2;
    int64 timestamp = 3;
}

// Additional message types for more complex services
message Greeting {
    string text = 1;
    string language = 2;
}

message GreetingRequest {
    Greeting greeting = 1;
    repeated string recipients = 2;
}

message GreetingResponse {
    int32 success_count = 1;
    int32 failure_count = 2;
    repeated string failed_recipients = 3;
}
