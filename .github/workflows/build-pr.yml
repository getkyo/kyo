name: build-pr
on:
  pull_request:
    branches:
      - main

# One job per arch. They run in parallel (no `needs:` between them), and each one's
# JVM/JS/Native targets also run in parallel via build.yml's `target` matrix.
# Add or comment out arches here when budget allows; the runner-image mapping for each
# is duplicated below to keep the workflow self-contained.

jobs:
  linux-x64:
    uses: ./.github/workflows/build.yml
    with:
      os: linux-x64
      runner-image: ubuntu-latest
      test-command: testDiff

  linux-arm64:
    uses: ./.github/workflows/build.yml
    with:
      os: linux-arm64
      runner-image: ubuntu-24.04-arm
      test-command: testDiff

  # Uncomment to extend the matrix when budget allows:
