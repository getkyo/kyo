name: release
on:
  push:
    branches: [main]
    tags: ["v1.*"]
  issue_comment:
    types: [created]

permissions:
  pull-requests: read
  contents: read

jobs:
  publish:
    if: |
      (github.event_name == 'push') ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       github.event.comment.body == '/release')
    runs-on: ubuntu-latest
    env:
      JAVA_OPTS: -Xms4G -Xmx4G -XX:ReservedCodeCacheSize=256M
      JVM_OPTS:  -Xms4G -Xmx4G -XX:ReservedCodeCacheSize=256M
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'issue_comment' && format('refs/pull/{0}/head', github.event.issue.number) || '' }}
      - uses: coursier/cache-action@v8.1.1
      # liburing rides along with the other native build deps: the kyo-net io_uring shim (kyo_uring.c)
      # statically links -luring, and publishing compiles it like any other build. This workflow does not
      # use .github/actions/setup, so install it here too.
      - name: Install Dependencies
        run: bash scripts/apt-install.sh libcurl4-openssl-dev libidn2-dev libh2o-evloop-dev=2.2.5+dfsg2-8.1ubuntu3 liburing-dev
      # Stage the vendored BoringSSL static archives before any build: without the staged tree,
      # build.sbt silently compiles the c-boringssl-stub shim into kyo-net (probe_available -> 0,
      # BoringSslProvider unavailable at runtime), so the published artifact would ship without
      # BoringSSL TLS. Same staging as .github/actions/setup; this runner is always linux x64.
      - name: Prepare BoringSSL
        run: |
          command -v cmake >/dev/null 2>&1 || bash scripts/apt-install.sh cmake
          command -v go >/dev/null 2>&1 || bash scripts/apt-install.sh golang-go
          bash kyo-net/build/boringssl/build-boringssl.sh linux-x86_64
      - uses: coursier/setup-action@v3.0.0
        with:
          jvm: corretto:25
          apps: sbt
      # Phase 1: build, sign, and stage EVERY platform into one local bundle (target/sona-staging).
      # dottydoc crashes intermittently while rendering per-module javadoc; that happens here, inside
      # +publishSigned (no upload), so each stage is independently retriable. CI_SONATYPE_RELEASE=""
      # turns ci-release's close+promote into a no-op, so these steps only stage. The first stage
      # cleans; the rest set CI_CLEAN="" so they do not wipe what earlier platforms staged. On a
      # snapshot build (main push / `/release`) ci-release publishes snapshots via +publish instead,
      # and the publish step below is skipped, matching the previous behavior.
      - name: Stage JVM (retriable)
        uses: nick-fields/retry@v4
        with:
          max_attempts: 3
          timeout_minutes: 120
          command: rm -rf target/sona-staging && sbt -Dplatform=JVM "ci-release"
        env:
          CI_SONATYPE_RELEASE: ""
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
      - name: Stage JS (retriable)
        uses: nick-fields/retry@v4
        with:
          max_attempts: 3
          timeout_minutes: 120
          command: sbt -Dplatform=JS "ci-release"
        env:
          CI_SONATYPE_RELEASE: ""
          CI_CLEAN: ""
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
      - name: Stage Native (retriable)
        uses: nick-fields/retry@v4
        with:
          max_attempts: 3
          timeout_minutes: 120
          command: sbt -Dplatform=Native "ci-release"
        env:
          CI_SONATYPE_RELEASE: ""
          CI_CLEAN: ""
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
      # Phase 2: upload and publish the whole staged bundle as ONE Central Portal deployment. Single
      # attempt: re-uploading would collide on the portal. It bundles target/sona-staging and does not
      # re-run doc. Tag pushes only; snapshots were already published by the stage steps above.
      - name: Publish all platforms
        if: startsWith(github.ref, 'refs/tags/v')
        uses: nick-fields/retry@v4
        with:
          max_attempts: 1
          timeout_minutes: 120
          command: sbt -Dplatform=JVM "sonaRelease"
        env:
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
