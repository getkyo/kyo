name: release
on:
  push:
    branches: [main]
    tags: ["v1.*"]
  issue_comment:
    types: [created]

permissions:
  pull-requests: read
  contents: read

jobs:
  publish:
    if: |
      (github.event_name == 'push') ||
      (github.event_name == 'issue_comment' && 
       github.event.issue.pull_request && 
       github.event.comment.body == '/release')
    runs-on: ubuntu-latest
    env:
      JAVA_OPTS: -Xms4G -Xmx4G -XX:ReservedCodeCacheSize=256M
      JVM_OPTS:  -Xms4G -Xmx4G -XX:ReservedCodeCacheSize=256M
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'issue_comment' && format('refs/pull/{0}/head', github.event.issue.number) || '' }}
      - uses: coursier/cache-action@v8.1.0
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libidn2-dev libh2o-evloop-dev=2.2.5+dfsg2-8.1ubuntu3
      - uses: coursier/setup-action@v3.0.0
        with:
          jvm: corretto:24
          apps: sbt
      - name: Publish JVM
        uses: nick-fields/retry@v4
        with:
          max_attempts: 3
          timeout_minutes: 15
          command: sbt -Dplatform=JVM "ci-release"
        env:
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
      - name: Publish JS
        uses: nick-fields/retry@v4
        with:
          max_attempts: 3
          timeout_minutes: 15
          command: sbt -Dplatform=JS "ci-release"
        env:
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
      - name: Publish Native
        uses: nick-fields/retry@v4
        with:
          max_attempts: 3
          timeout_minutes: 15
          command: sbt -Dplatform=Native "ci-release"
        env:
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
