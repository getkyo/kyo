name: release
on:
  push:
    branches: [main]
    tags: ["v1.*"]
  issue_comment:
    types: [created]

permissions:
  pull-requests: read
  contents: read

jobs:
  publish:
    if: |
      (github.event_name == 'push') ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       github.event.comment.body == '/release')
    runs-on: ubuntu-latest
    env:
      JAVA_OPTS: -Xms4G -Xmx4G -XX:ReservedCodeCacheSize=256M
      JVM_OPTS:  -Xms4G -Xmx4G -XX:ReservedCodeCacheSize=256M
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'issue_comment' && format('refs/pull/{0}/head', github.event.issue.number) || '' }}
      - uses: coursier/cache-action@v8.1.1
      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libidn2-dev libh2o-evloop-dev=2.2.5+dfsg2-8.1ubuntu3
      - uses: coursier/setup-action@v3.0.0
        with:
          jvm: corretto:24
          apps: sbt
      # JVM and Native generate per-module Scala 3 javadoc, and dottydoc crashes intermittently
      # (null SignatureBuilder.content() NPE) while rendering signatures. That crash happens during
      # `+publishSigned`, which only stages signed artifacts to target/sona-staging (no upload), so it
      # is safe to retry. The close+promote (sonaRelease) uploads the staged bundle and must NOT be
      # retried: a second upload collides on the Central Portal. So stage retriably, then release once.
      #
      # On a snapshot build (main push / `/release` PR comment) ci-release does `+publish` instead and
      # there is no staging or promotion; the Release steps are guarded to tag pushes, the only case
      # where ci-release itself would have run sonaRelease.
      - name: Stage JVM (retriable)
        uses: nick-fields/retry@v4
        with:
          max_attempts: 3
          timeout_minutes: 120
          # CI_SONATYPE_RELEASE="" replaces ci-release's close+promote command with a no-op, so on a tag
          # it runs clean + +publishSigned (stage only) and on a snapshot it runs +publish unchanged.
          command: rm -rf target/sona-staging && sbt -Dplatform=JVM "ci-release"
        env:
          CI_SONATYPE_RELEASE: ""
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
      - name: Release JVM
        if: startsWith(github.ref, 'refs/tags/v')
        uses: nick-fields/retry@v4
        with:
          max_attempts: 1
          timeout_minutes: 120
          # Bundles the staged target/sona-staging and uploads+publishes it. No clean/rm: it reuses the
          # artifacts staged above and does not re-run doc.
          command: sbt -Dplatform=JVM "sonaRelease"
        env:
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
      - name: Publish JS
        uses: nick-fields/retry@v4
        with:
          max_attempts: 1
          timeout_minutes: 120
          command: rm -rf target/sona-staging && sbt -Dplatform=JS "ci-release"
        env:
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
      - name: Stage Native (retriable)
        uses: nick-fields/retry@v4
        with:
          max_attempts: 3
          timeout_minutes: 120
          command: rm -rf target/sona-staging && sbt -Dplatform=Native "ci-release"
        env:
          CI_SONATYPE_RELEASE: ""
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
      - name: Release Native
        if: startsWith(github.ref, 'refs/tags/v')
        uses: nick-fields/retry@v4
        with:
          max_attempts: 1
          timeout_minutes: 120
          command: sbt -Dplatform=Native "sonaRelease"
        env:
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
      - name: Publish Wasm
        uses: nick-fields/retry@v4
        with:
          max_attempts: 1
          timeout_minutes: 120
          command: rm -rf target/sona-staging && sbt -Dplatform=Wasm "ci-release"
        env:
          PGP_PASSPHRASE: ${{ secrets.PGP_PASSPHRASE }}
          PGP_SECRET: ${{ secrets.PGP_SECRET }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
