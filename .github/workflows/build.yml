name: build
# Reusable workflow: builds + tests one arch across the JVM, JS, Native, and Wasm targets.
#
# Parallel across targets: `max-parallel: 4` runs all four targets at once, each as its own
# matrix job on its own runner, so they never share a runner's memory or daemons.
#
# Serial within a target: SBT_TASK_LIMIT=1 (set in env below) runs one sbt task at a time inside
# each job, bounding peak memory to a single module's compile/link/test on the 16GB runners.
#
# Parallel across archs: the parent workflow (build-pr.yml / build-main.yml) calls this workflow
# once per arch. Those calls have no `needs:` between them so the archs run as independent CI jobs.
on:
  workflow_call:
    inputs:
      os:
        description: 'Target os/arch identifier (e.g. linux-x64, linux-arm64).'
        type: string
        required: true
      runner-image:
        description: 'GitHub-hosted runner label for `runs-on` (e.g. ubuntu-latest).'
        type: string
        required: true
      targets:
        description: 'Space-separated platform subset the matrix runs (subset of JVM JS Native Wasm).'
        type: string
        required: false
        default: 'JVM JS Native Wasm'
      mode:
        description: 'Run-shape selector: full -> test, diff -> testDiff, custom -> the command escape hatch.'
        type: string
        required: false
        default: full
      ref:
        description: 'Git ref (branch or sha) to check out. Empty string checks out the dispatch ref.'
        type: string
        required: false
        default: ''

jobs:
  prep:
    runs-on: ubuntu-latest
    outputs:
      targets: ${{ steps.parse.outputs.targets }}
    steps:
      - id: parse
        env:
          TARGETS: ${{ inputs.targets }}
        run: |
          arr=$(jq -cn --arg s "$TARGETS" '$s | split(" ") | map(select(length > 0))')
          echo "targets=$arr" >> "$GITHUB_OUTPUT"

  build:
    needs: prep
    # JVM full runs peak at ~95-100 min (browser/UI/caliban suites serialize under a shared Chrome
    # instance that cannot take concurrent CDP connections). 180 min gives headroom above that peak.
    timeout-minutes: 180
    strategy:
      fail-fast: false
      max-parallel: 4
      matrix:
        # prep parses inputs.targets (space-separated) into a JSON array via jq.
        # An empty or all-blank targets value produces an empty array, so the matrix
        # spawns zero jobs rather than one invalid job.
        target: ${{ fromJSON(needs.prep.outputs.targets) }}
    runs-on: ${{ inputs.runner-image }}
    env:
      # Serialize the whole CI build: one sbt task at a time. Compile and Scala.js/Wasm link run
      # in-process in the sbt driver heap, and the Native optimizer plus forked LLVM/podman/chrome
      # run alongside it; on the 16GB runners two of those at once either exhaust the 12GB heap
      # (java.lang.OutOfMemoryError) or overcommit the box (kernel OOM-kill, exit 143). max-parallel:4
      # still runs the four targets on separate runners, so this costs no wall-clock on the JVM pole.
      SBT_TASK_LIMIT: 1
      # The sbt driver heap is governed by the checked-in .jvmopts (12G): the sbt runner appends
      # .jvmopts after these env opts on the java command line, so an -Xmx set here would never
      # take effect. The env therefore carries only the non-heap flags, which do reach the JVM
      # because .jvmopts holds no conflicting duplicates for them.
      JAVA_OPTS: "-Xss10M -XX:+UseG1GC -XX:+UseCompactObjectHeaders -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=256M -Dfile.encoding=UTF-8"
      JVM_OPTS:  "-Xss10M -XX:+UseG1GC -XX:+UseCompactObjectHeaders -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=256M -Dfile.encoding=UTF-8"
      # Link kyo-schema-tests' native test binary in its own sbt driver before the aggregate link: its
      # whole-program optimize runs against a fresh heap instead of a driver that has accumulated
      # ~10 prior modules of heap and metaspace. ci-test.sh honors this only for the Native target.
      NATIVE_HEAVY: "${{ matrix.target == 'Native' && 'kyo-schema-tests' || '' }}"
      # Cap the Native link drivers to 2 CPUs (-XX:ActiveProcessorCount). The scala-native
      # toolchain sizes its optimizer pool and its concurrent clang forks from
      # availableProcessors, and the fork fleet stacked on the driver heap is what overcommits
      # the 16GB runner (kernel OOM, exit 143). ci-test.sh applies this to the nativeLink
      # invocations only; compile and the test run keep all 4 CPUs.
      NATIVE_LINK_CPUS: "${{ matrix.target == 'Native' && '2' || '' }}"

    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0

      - uses: ./.github/actions/setup
        with:
          os: ${{ inputs.os }}
          target: ${{ matrix.target }}

      # kyo-browser auto-downloads `chrome-headless-shell` (~120 MB) on first launch and caches it under the
      # platform's user cache dir; the setup action restores it. The action also installs Node, the native
      # libraries, and podman conditionally on the target and os, and provisions corretto:25 + sbt.

      - name: ${{ inputs.mode }} ${{ matrix.target }} (${{ inputs.os }})
        shell: bash
        run: |
          action="${{ inputs.mode == 'diff' && 'testDiff' || 'test' }}"
          ./scripts/ci-test.sh "${{ matrix.target }}" "$action"
