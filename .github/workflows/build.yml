name: build
on:
  workflow_call:
    inputs:
      os-matrix:
        type: string
        required: true
      test-command:
        type: string
        required: true

jobs:
  build:
    timeout-minutes: ${{ matrix.target == 'Native' && 70 || 50 }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(inputs.os-matrix) }}
        target: [JVM, JS, Native]
    runs-on: >-
      ${{ matrix.os == 'linux-x64'     && 'ubuntu-latest'
       || matrix.os == 'linux-arm64'   && 'ubuntu-24.04-arm'
       || matrix.os == 'macos-x64'     && 'macos-latest-large'
       || matrix.os == 'macos-arm64'   && 'macos-latest-xlarge'
       || matrix.os == 'windows-x64'   && 'build-windows-x64'
       || matrix.os == 'windows-arm64' && 'build-windows-arm' }}
    env:
      JAVA_OPTS: >-
        ${{ contains(matrix.os, 'macos-arm64')
        && '-Xmx6G -Xss10M -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=256M -Dfile.encoding=UTF-8'
        || '-Xms8G -Xmx8G -Xss10M -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=256M -Dfile.encoding=UTF-8' }}
      JVM_OPTS: >-
        ${{ contains(matrix.os, 'macos-arm64')
        && '-Xmx6G -Xss10M -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=256M -Dfile.encoding=UTF-8'
        || '-Xms8G -Xmx8G -Xss10M -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=256M -Dfile.encoding=UTF-8' }}

    steps:
      - uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6.4.0
        if: matrix.target == 'JS'
        with:
          node-version: '22'

      - uses: actions/cache@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          path: |
            ~/.cache/coursier
            ~/Library/Caches/Coursier
            ~/AppData/Local/Coursier/Cache
            ~/.sbt
            ~/.ivy2/cache
          key: deps-${{ matrix.os }}-${{ hashFiles('build.sbt', 'project/build.properties', 'project/plugins.sbt', 'project/*.scala') }}
          restore-keys: deps-${{ matrix.os }}-

      - name: Install Dependencies (Linux)
        if: contains(matrix.os, 'linux') && matrix.target == 'Native'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcurl4-openssl-dev libidn2-dev libh2o-evloop-dev=2.2.5+dfsg2-8.1ubuntu3

      - name: Install Dependencies (macOS)
        if: contains(matrix.os, 'macos') && matrix.target == 'Native'
        run: brew install h2o libidn2

      - name: Install + start Podman (Linux)
        if: contains(matrix.os, 'linux')
        run: |
          sudo apt-get update
          sudo apt-get install -y podman uidmap
          # Enable systemd lingering so podman uses the systemd cgroup manager
          # instead of falling back to cgroupfs. Without this:
          #   - podman emits cgroupv2 warnings to stderr on every command
          #   - pause/unpause fail (cgroupfs in cgroup v2 has no unprivileged freezer)
          #   - container lifecycle reporting becomes unreliable
          uid="$(id -u)"
          sudo loginctl enable-linger "$uid"
          # Wait for the per-user systemd runtime dir to come up.
          for _ in $(seq 1 20); do
            [ -d "/run/user/$uid" ] && break
            sleep 1
          done
          export XDG_RUNTIME_DIR="/run/user/$uid"
          mkdir -p "$XDG_RUNTIME_DIR/podman"
          # Start the rootless API socket — kyo-pod's HTTP backend probes
          # $XDG_RUNTIME_DIR/podman/podman.sock first.
          nohup podman system service --time=0 \
            "unix://$XDG_RUNTIME_DIR/podman/podman.sock" \
            > /tmp/podman.log 2>&1 &
          for _ in $(seq 1 10); do
            [ -S "$XDG_RUNTIME_DIR/podman/podman.sock" ] && break
            sleep 1
          done
          echo "XDG_RUNTIME_DIR=$XDG_RUNTIME_DIR" >> "$GITHUB_ENV"
          # Verify systemd cgroup manager is selected — diagnostic for CI logs.
          podman info --format '{{.Host.CgroupManager}} / {{.Host.CgroupVersion}}'
          podman version
          docker version

      - uses: coursier/setup-action@v3.0.0
        if: matrix.os != 'windows-arm64'
        with:
          jvm: temurin:25
          apps: sbt

      # Windows ARM64: coursier/setup-action doesn't support this platform yet.
      # JDK 25 and sbt are pre-installed on the runner image.
      - name: Setup JDK (Windows ARM64)
        if: matrix.os == 'windows-arm64'
        shell: bash
        run: echo "JAVA_HOME=$JAVA_HOME_25_AARCH64" >> "$GITHUB_ENV"

      - name: Test ${{ matrix.target }} (${{ matrix.os }})
        shell: bash
        run: |
          # macOS arm64 (14GB): serialize JS/Native to avoid Scala.js linker OOM
          if [ "${{ matrix.os }}" = "macos-arm64" ] && [ "${{ matrix.target }}" != "JVM" ]; then
            export SBT_TASK_LIMIT=1
          fi

          # Windows: serialize all sbt tasks to avoid OverlappingFileLockException
          # during coursier dependency resolution (mandatory file locks).
          case "${{ matrix.os }}" in
            windows-*) export SBT_TASK_LIMIT=1;;
          esac

          # Build testKyo command
          mode="${{ inputs.test-command == 'test' && '--all' || '' }}"
          cmd="testKyo $mode ${{ matrix.target }}"

          if [ "${{ matrix.target }}" = "Native" ]; then
            # Native tests need retry wrapper for libunwind crash tolerance
            ./scripts/native-test.sh "$cmd"
          else
            sbt "$cmd"
          fi
