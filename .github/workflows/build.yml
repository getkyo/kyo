name: build
# Reusable workflow: builds + tests one arch with the target axis serialized.
#
# Sequential within arch: `max-parallel: 1` on the `target` matrix means JVM, JS,
# Native, Wasm run one at a time inside this workflow invocation. Two same-arch jobs never
# compete for the same runner pool, which previously caused container-stop timeouts
# and resource starvation on arm64 under contention.
#
# Parallel across archs: the parent workflow (build-pr.yml / build-main.yml) calls
# this workflow once per arch. Those calls have no `needs:` between them so they run
# in parallel as independent CI jobs.
on:
  workflow_call:
    inputs:
      os:
        description: 'Target os/arch identifier (e.g. linux-x64, linux-arm64).'
        type: string
        required: true
      runner-image:
        description: 'GitHub-hosted runner label for `runs-on` (e.g. ubuntu-latest).'
        type: string
        required: true
      test-command:
        description: 'sbt task to run via testKyo (e.g. test, testDiff).'
        type: string
        required: true

jobs:
  build:
    # The kyo-test PR forces a FULL run on every commit (it changes project/build.sbt &
    # plugins.sbt vs main, so the testKyo harness runs all modules), and the browser/UI/caliban
    # suites now run their leaves sequentially (shared Chrome can't take concurrent CDP). That
    # full run is ~95-100 min on the JVM target, which overran the previous 90. Post-merge, runs
    # go incremental again and finish well under this. Raised to give the forced full run headroom.
    timeout-minutes: 180
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix:
        target: [JVM, JS, Native, Wasm]
    runs-on: ${{ inputs.runner-image }}
    env:
      JAVA_OPTS: >-
        ${{ inputs.os == 'macos-arm64'
        && '-Xmx6G -Xss10M -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=256M -Dfile.encoding=UTF-8'
        || '-Xms8G -Xmx12G -Xss10M -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=256M -Dfile.encoding=UTF-8' }}
      JVM_OPTS: >-
        ${{ inputs.os == 'macos-arm64'
        && '-Xmx6G -Xss10M -XX:MaxMetaspaceSize=1G -XX:ReservedCodeCacheSize=256M -Dfile.encoding=UTF-8'
        || '-Xms8G -Xmx12G -Xss10M -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=256M -Dfile.encoding=UTF-8' }}

    steps:
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0

      # The WASM target requires Node 24+: it defaults to V8's Turboshaft Wasm pipeline (Node 22/23
      # miscompile the generated WasmGC code and no longer accept --turboshaft-wasm). JS runs on the
      # same version to keep a single Node across the matrix.
      - uses: actions/setup-node@v6.4.0
        if: matrix.target == 'JS' || matrix.target == 'Wasm'
        with:
          node-version: '24'

      - uses: actions/cache@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          path: |
            ~/.cache/coursier
            ~/Library/Caches/Coursier
            ~/AppData/Local/Coursier/Cache
            ~/.sbt
            ~/.ivy2/cache
          key: deps-${{ inputs.os }}-${{ hashFiles('build.sbt', 'project/build.properties', 'project/plugins.sbt', 'project/*.scala') }}
          restore-keys: deps-${{ inputs.os }}-

      # kyo-browser auto-downloads `chrome-headless-shell` (~120 MB) on first launch and caches it under the
      # platform's user cache dir. Without this step every job re-fetches the same binary. The cache key includes
      # Browser.scala (carries the pinned fallbackVersion) and ChromeDownloader.scala (carries the URL template and
      # extracted layout) so a version bump or a downloader change invalidates the cache cleanly. linux-arm64 and
      # windows-arm64 jobs cancel kyo-browser tests at runtime (no chrome-headless-shell build for those platforms),
      # so the cache stays empty there — harmless.
      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/kyo-browser
            ~/Library/Caches/kyo-browser
            ~/AppData/Local/kyo-browser
          key: kyo-browser-${{ inputs.os }}-${{ hashFiles('kyo-browser/shared/src/main/scala/kyo/Browser.scala', 'kyo-browser/shared/src/main/scala/kyo/internal/ChromeDownloader.scala') }}
          restore-keys: kyo-browser-${{ inputs.os }}-

      # apt/brew package-mirror reachability is a recurring transient CI failure
      # (e.g. ports.ubuntu.com Network unreachable). Retry only the dependency-install
      # network operations — never compile/test steps.
      - name: Install Dependencies (Linux)
        if: contains(inputs.os, 'linux') && matrix.target == 'Native'
        uses: nick-fields/retry@v4
        with:
          max_attempts: 3
          timeout_minutes: 5
          retry_wait_seconds: 15
          command: |
            sudo apt-get update
            sudo apt-get install -y -o Acquire::Retries=3 libcurl4-openssl-dev libidn2-dev libh2o-evloop-dev=2.2.5+dfsg2-8.1ubuntu3

      - name: Install Dependencies (macOS)
        if: contains(inputs.os, 'macos') && matrix.target == 'Native'
        uses: nick-fields/retry@v4
        with:
          max_attempts: 3
          timeout_minutes: 5
          retry_wait_seconds: 15
          command: brew install h2o libidn2

      # liburing is needed to BUILD the kyo-net io_uring shim (kyo_uring.c, RI-003).
      # The shim is statically linked, so the shipped artifact has zero runtime
      # liburing dependency; this is a build-time-only dep. Needed on both the JVM
      # target (kyo-ffi plugin compiles the shim via cc) and the Native target
      # (Scala Native linker), so it is not gated on a single target. macOS and
      # Windows compile the shim to a stub (header #if guard) and need nothing.
      - name: Install liburing (Linux)
        if: contains(inputs.os, 'linux') && (matrix.target == 'JVM' || matrix.target == 'Native')
        uses: nick-fields/retry@v4
        with:
          max_attempts: 3
          timeout_minutes: 5
          retry_wait_seconds: 15
          command: |
            sudo apt-get update
            sudo apt-get install -y -o Acquire::Retries=3 liburing-dev

      # Split from the podman start logic so only the apt install is retried — the
      # Start step below is not idempotent (background service launch, GITHUB_ENV
      # export) and must not be re-run.
      - name: Install podman (Linux)
        if: contains(inputs.os, 'linux')
        uses: nick-fields/retry@v4
        with:
          max_attempts: 3
          timeout_minutes: 5
          retry_wait_seconds: 15
          command: |
            sudo apt-get update
            sudo apt-get install -y -o Acquire::Retries=3 podman uidmap

      - name: Start podman (Linux)
        if: contains(inputs.os, 'linux')
        run: |
          # Enable systemd lingering so podman uses the systemd cgroup manager
          # instead of falling back to cgroupfs. Without this:
          #   - podman emits cgroupv2 warnings to stderr on every command
          #   - pause/unpause fail (cgroupfs in cgroup v2 has no unprivileged freezer)
          #   - container lifecycle reporting becomes unreliable
          uid="$(id -u)"
          sudo loginctl enable-linger "$uid"
          # Wait for the per-user systemd runtime dir to come up.
          for _ in $(seq 1 20); do
            [ -d "/run/user/$uid" ] && break
            sleep 1
          done
          export XDG_RUNTIME_DIR="/run/user/$uid"
          mkdir -p "$XDG_RUNTIME_DIR/podman"
          # Start the rootless API socket — kyo-pod's HTTP backend probes
          # $XDG_RUNTIME_DIR/podman/podman.sock first.
          nohup podman system service --time=0 \
            "unix://$XDG_RUNTIME_DIR/podman/podman.sock" \
            > /tmp/podman.log 2>&1 &
          for _ in $(seq 1 10); do
            [ -S "$XDG_RUNTIME_DIR/podman/podman.sock" ] && break
            sleep 1
          done
          echo "XDG_RUNTIME_DIR=$XDG_RUNTIME_DIR" >> "$GITHUB_ENV"
          # Diagnostic: print cgroup-related fields so CI logs show which manager
          # podman picked. Tolerate failures — the field names vary across versions.
          podman info | grep -iE 'cgroup|rootless' || true
          podman version
          docker version

      - uses: coursier/setup-action@v3.0.0
        if: inputs.os != 'windows-arm64'
        with:
          jvm: corretto:24
          apps: sbt

      # Windows ARM64: coursier/setup-action doesn't support this platform yet.
      # JDK 25 and sbt are pre-installed on the runner image.
      - name: Setup JDK (Windows ARM64)
        if: inputs.os == 'windows-arm64'
        shell: bash
        run: echo "JAVA_HOME=$JAVA_HOME_25_AARCH64" >> "$GITHUB_ENV"

      # kyo-ffi-it requires `kyo-ffi-plugin`'s bundled codegen resources
      # (kyo-ffi-codegen.jar + Scala 3 runtime jars) to exist on disk before
      # the main build's meta-build is loaded. The meta-build
      # (`project/plugins.sbt`) copies those resources at sbt-boot time; if
      # they are not already generated, `KyoFfiPlugin` runs against an empty
      # bundle and `ffiGenerate` produces no impls, causing kyo-ffi-it tests
      # to fail with "Cannot instantiate generated FFI impl". Running
      # `kyo-ffi-plugin/Compile/packageBin` in a separate sbt invocation
      # materializes the resources before the main test sbt session boots.
      - name: Prepare kyo-ffi-plugin bundled resources
        shell: bash
        run: sbt "kyo-ffi-plugin/Compile/packageBin"

      # Build + stage the vendored BoringSSL (libssl.a + libcrypto.a) for the runner's os-arch before
      # the test step (RI-006 / AD-007 / D6). build-boringssl.sh clones BoringSSL at the pinned commit
      # and builds static archives via CMake + Go; cmake/go are pre-installed on GitHub-hosted runners,
      # but install them defensively if absent. The staged tree is gitignored (a build artifact), so it
      # must be produced on every runner. Without it the kyonet_boringssl shim links a stub and the
      # BoringSSL TLS tests cancel; with it they run against real BoringSSL on JVM and Native.
      - name: Prepare BoringSSL
        if: matrix.target == 'JVM' || matrix.target == 'Native'
        shell: bash
        run: |
          # Map the runner os identifier to the build-boringssl.sh / staged/<os-arch>/ naming.
          case "${{ inputs.os }}" in
            linux-x64)   OS_ARCH=linux-x86_64 ;;
            linux-arm64) OS_ARCH=linux-aarch64 ;;
            macos-arm64) OS_ARCH=darwin-aarch64 ;;
            *) echo "BoringSSL not staged for ${{ inputs.os }} (unsupported os-arch); skipping" && exit 0 ;;
          esac
          if [[ "${{ inputs.os }}" == linux-* ]]; then
            command -v cmake >/dev/null 2>&1 || { sudo apt-get update && sudo apt-get install -y -o Acquire::Retries=3 cmake; }
            command -v go >/dev/null 2>&1 || { sudo apt-get update && sudo apt-get install -y -o Acquire::Retries=3 golang-go; }
          else
            command -v cmake >/dev/null 2>&1 || brew install cmake
            command -v go >/dev/null 2>&1 || brew install go
          fi
          bash kyo-net/build/boringssl/build-boringssl.sh "$OS_ARCH"

      - name: Test ${{ matrix.target }} (${{ inputs.os }})
        shell: bash
        run: |
          # macOS arm64 (14GB): serialize JS/Native to avoid Scala.js linker OOM
          if [ "${{ inputs.os }}" = "macos-arm64" ] && [ "${{ matrix.target }}" != "JVM" ]; then
            export SBT_TASK_LIMIT=1
          fi

          # Native: nativeLink forks one LLVM process per module and Scala Native's
          # optimizer wants the full -Xmx12G heap. On the 16GB Linux runners
          # (ubuntu-latest, ubuntu-24.04-arm) the concurrent native memory plus that
          # heap overcommits and the kernel OOM-kills the runner (job fails with the
          # test step stuck in progress and no uploaded log). Serialize so modules
          # link one at a time, capping peak memory. macOS/Windows already serialize
          # these targets above; this is the redundant-but-explicit Linux case.
          if [ "${{ matrix.target }}" = "Native" ]; then
            export SBT_TASK_LIMIT=1
          fi

          # Windows: serialize all sbt tasks to avoid OverlappingFileLockException
          # during coursier dependency resolution (mandatory file locks).
          case "${{ inputs.os }}" in
            windows-*) export SBT_TASK_LIMIT=1;;
          esac

          # Build testKyo command
          mode="${{ inputs.test-command == 'test' && '--all' || '' }}"
          cmd="testKyo $mode ${{ matrix.target }}"

          if [ "${{ matrix.target }}" = "Native" ]; then
            # Native tests need retry wrapper for libunwind crash tolerance
            ./scripts/native-test.sh "$cmd"
          else
            sbt "$cmd"
          fi

      # kyo-net ships three transport backends behind one public API: the posix
      # transport (io_uring/epoll/kqueue over Panama FFI, the JVM default), the pure-JDK
      # NIO floor, and Node (JS). The shared kyo.net.Transport* / Connection / ConnectBurst
      # behavioral suite runs against NetPlatform.transport, which on the JVM is the posix
      # default, so those same tests never exercise the NIO floor in the run above. This
      # leg forces -Dkyo.net.backend=nio so the identical shared behavioral contract runs
      # against NIO too, keeping the backends consistent (it caught a CWE-326 TLS
      # version-downgrade in the NIO inline path the posix-default run could not). NIO is
      # pure JDK and arch-independent, so one representative JVM leg suffices.
      - name: kyo-net NIO floor consistency (shared suite forced to NIO)
        if: inputs.os == 'linux-x64' && matrix.target == 'JVM'
        shell: bash
        run: sbt 'set LocalProject("kyo-net") / Test / javaOptions += "-Dkyo.net.backend=nio"' 'kyo-net/testOnly kyo.net.Transport* kyo.net.ConnectionTest kyo.net.ConnectBurstTest'

      # The posix transport selects one I/O driver per host: io_uring on a capable Linux
      # (the linux-x64 CI default), kqueue on macOS, epoll otherwise. So on linux-x64 the
      # shared behavioral suite above runs against io_uring and never against epoll, even
      # though epoll is a selectable backend (-Dkyo.net.backend=epoll) with a distinct
      # readiness-based I/O model (the session found driver-specific bugs: EINTR, short
      # submit). This leg forces epoll so the identical shared behavioral contract runs
      # against the epoll driver too, the posix-driver analogue of the NIO floor leg.
      - name: kyo-net epoll driver consistency (shared suite forced to epoll)
        if: inputs.os == 'linux-x64' && matrix.target == 'JVM'
        shell: bash
        run: sbt 'set LocalProject("kyo-net") / Test / javaOptions += "-Dkyo.net.backend=epoll"' 'kyo-net/testOnly kyo.net.Transport* kyo.net.ConnectionTest kyo.net.ConnectBurstTest'

      # kyo-ffi-plugin scripted tests exercise the plugin against real sbt
      # projects (JVM + JS + Native). They are expensive, so run only once per
      # matrix pass — on the linux-x64 JVM leg. The plugin publishes kyo-ffi
      # (JVM/JS/Native) and dependencies to the local ivy cache before
      # invoking scripted, so no extra setup is needed here.
      - name: kyo-ffi plugin scripted tests
        if: inputs.os == 'linux-x64' && matrix.target == 'JVM'
        shell: bash
        run: sbt "kyo-ffi-plugin/scripted"
