name: build-dispatch
# Manually-triggered build/test for a single sbt command. Lets a maintainer run CI on a
# branch on demand (without opening a PR) and scope to one module/platform for fast feedback,
# e.g. `kyo-uiJVM/test` (JVM), `kyo-uiJS/test`, `kyo-uiNative/test`, `kyo-uiWasm/test`. The full
# cross-platform matrix still runs via build-pr.yml on the PR; this is a focused, on-demand
# complement.
#
# Provisions JDK + sbt + Node + the kyo-browser Chrome cache + the Linux native libraries
# (libcurl/libidn/h2o) Scala Native links against, so JVM, JS, Native, and Wasm suites all run.
# kyo-pod tests additionally need a running podman daemon, which this workflow does not start;
# run those through the full build-pr.yml matrix.
on:
  workflow_dispatch:
    inputs:
      command:
        description: 'sbt command to run, e.g. "kyo-uiJVM/test", "kyo-uiJS/test", "kyo-uiNative/test", "kyo-uiWasm/test", or "testKyo JVM" (diff vs origin/main).'
        type: string
        required: true
        default: 'testKyo JVM'
      ref:
        description: 'Git ref (branch or sha) to check out and test. Defaults to the ref the workflow is dispatched on.'
        type: string
        required: false
        default: ''
      runner-image:
        description: 'Runner image.'
        type: choice
        options:
          - ubuntu-latest
          - ubuntu-24.04-arm
        default: ubuntu-latest

concurrency:
  group: build-dispatch-${{ github.ref }}-${{ inputs.ref }}-${{ inputs.command }}
  cancel-in-progress: true

jobs:
  run:
    timeout-minutes: 180
    runs-on: ${{ inputs.runner-image }}
    env:
      # Serialize: one sbt task at a time. A broad command (e.g. `testKyo JVM`) compiles/links and
      # forks many modules in one process; on the 16GB runner two concurrent compiles/forks either
      # exhaust the 12GB heap (java.lang.OutOfMemoryError) or overcommit the box (kernel OOM-kill,
      # exit 143). Mirrors build.yml; a single-module command has little parallelism to lose anyway.
      SBT_TASK_LIMIT: 1
      # G1 is the JDK 24 default; pin it explicitly. -Xmx12G is the driver ceiling for the compile/link
      # phase; no -Xms floor, so G1 releases that heap during the test phase, when the forked test JVMs
      # (sized via build.sbt Test/javaOptions) do the work. Mirrors build.yml.
      JAVA_OPTS: '-Xmx12G -Xss10M -XX:+UseG1GC -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=256M -Dfile.encoding=UTF-8'
      JVM_OPTS:  '-Xmx12G -Xss10M -XX:+UseG1GC -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=256M -Dfile.encoding=UTF-8'
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          # Empty input falls back to the dispatched ref; full history so `testKyo` can diff vs origin/main.
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0

      - uses: actions/setup-node@v6.4.0
        with:
          node-version: '24'

      - uses: actions/cache@v5
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
        with:
          path: |
            ~/.cache/coursier
            ~/.sbt
            ~/.ivy2/cache
          key: deps-dispatch-${{ inputs.runner-image }}-${{ hashFiles('build.sbt', 'project/build.properties', 'project/plugins.sbt', 'project/*.scala') }}
          restore-keys: deps-dispatch-${{ inputs.runner-image }}-

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cache/kyo-browser
          key: kyo-browser-dispatch-${{ inputs.runner-image }}-${{ hashFiles('kyo-browser/shared/src/main/scala/kyo/Browser.scala', 'kyo-browser/shared/src/main/scala/kyo/internal/ChromeDownloader.scala') }}
          restore-keys: kyo-browser-dispatch-${{ inputs.runner-image }}-

      # Scala Native links against these system libraries. Mirrors build.yml's native dependency
      # install; retried because apt mirror reachability is a recurring transient CI failure.
      - name: Install native dependencies (Linux)
        uses: nick-fields/retry@v4
        with:
          max_attempts: 3
          timeout_minutes: 5
          retry_wait_seconds: 15
          command: |
            sudo apt-get update
            sudo apt-get install -y -o Acquire::Retries=3 libcurl4-openssl-dev libidn2-dev libh2o-evloop-dev=2.2.5+dfsg2-8.1ubuntu3

      - uses: coursier/setup-action@v3.0.0
        with:
          jvm: corretto:24
          apps: sbt

      - name: Run sbt command
        shell: bash
        # Pass the input through the environment (never interpolated into the shell) to avoid command injection.
        # Native tests run under scripts/native-test.sh for libunwind crash-retry tolerance, matching build.yml.
        env:
          SBT_COMMAND: ${{ inputs.command }}
        run: |
          if [[ "$SBT_COMMAND" == *Native/* ]]; then
            ./scripts/native-test.sh "$SBT_COMMAND"
          else
            sbt "$SBT_COMMAND"
          fi
