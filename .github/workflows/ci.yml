name: ci
# Unified trigger workflow. One entry point for every build/test path:
#   push to main      -> mode=full  across both arches
#   pull_request      -> mode=diff  across both arches
#   workflow_dispatch -> flexible: pick targets, mode (full/diff/custom), and arches
#
# prep derives mode + arches + targets from the trigger, then build fans out one
# build.yml call per arch (each call matrixes JVM/JS/Native/Wasm internally). custom is
# the single-runner eval escape hatch, fired only on a workflow_dispatch with mode=custom.
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
    inputs:
      targets:
        description: 'Space-separated platform subset to dispatch (subset of JVM JS Native Wasm).'
        type: string
        required: false
        default: 'JVM JS Native Wasm'
      mode:
        description: 'Run-shape: full (test), diff (testDiff), or custom (the command escape hatch).'
        type: choice
        options:
          - full
          - diff
          - custom
        default: full
      arches:
        description: 'Which arches to run (space-separated subset of x64 arm64).'
        type: choice
        options:
          - 'x64 arm64'
          - 'x64'
          - 'arm64'
        default: 'x64 arm64'
      command:
        description: 'Used only when mode=custom: the recommended form is ./scripts/ci-test.sh <platform> <action>.'
        type: string
        required: false
        default: './scripts/ci-test.sh JVM test'
      ref:
        description: 'Git ref (branch or sha) to check out and test. Defaults to the ref the workflow is dispatched on.'
        type: string
        required: false
        default: ''

# A pull request keys its group on the PR number, so a new commit supersedes the in-flight run.
# A push (to main) keys on the commit sha, so every commit gets its own group and is validated on
# its own; cancel-in-progress only acts within a group, so a later push never cancels an earlier
# main run.
concurrency:
  group: ci-${{ github.event.pull_request.number || github.sha }}-${{ inputs.mode }}-${{ inputs.targets }}-${{ inputs.arches }}-${{ inputs.command }}
  cancel-in-progress: true

jobs:
  prep:
    runs-on: ubuntu-latest
    outputs:
      mode: ${{ steps.derive.outputs.mode }}
      arches: ${{ steps.derive.outputs.arches }}
      targets: ${{ steps.derive.outputs.targets }}
    steps:
      - id: derive
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_MODE: ${{ inputs.mode }}
          INPUT_ARCHES: ${{ inputs.arches }}
          INPUT_TARGETS: ${{ inputs.targets }}
        run: |
          case "$EVENT_NAME" in
            workflow_dispatch) mode="$INPUT_MODE" ;;
            pull_request)      mode="diff" ;;
            *)                 mode="full" ;;
          esac

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            arches=$(jq -cn --arg s "$INPUT_ARCHES" '
              $s
              | split(" ")
              | map(select(length > 0))
              | map(
                  if . == "x64" then {os: "linux-x64", image: "ubuntu-latest"}
                  elif . == "arm64" then {os: "linux-arm64", image: "ubuntu-24.04-arm"}
                  else empty end
                )')
            targets="$INPUT_TARGETS"
          else
            arches='[{"os":"linux-x64","image":"ubuntu-latest"},{"os":"linux-arm64","image":"ubuntu-24.04-arm"}]'
            targets='JVM JS Native Wasm'
          fi

          {
            echo "mode=$mode"
            echo "arches=$arches"
            echo "targets=$targets"
          } >> "$GITHUB_OUTPUT"

  build:
    needs: prep
    if: ${{ needs.prep.outputs.mode != 'custom' }}
    strategy:
      fail-fast: false
      matrix:
        arch: ${{ fromJSON(needs.prep.outputs.arches) }}
    uses: ./.github/workflows/build.yml
    with:
      os: ${{ matrix.arch.os }}
      runner-image: ${{ matrix.arch.image }}
      targets: ${{ needs.prep.outputs.targets }}
      mode: ${{ needs.prep.outputs.mode }}
      ref: ${{ inputs.ref }}

  # Run the kyo-stats-machine suite beyond the standard arch matrix (build.yml), which only ever
  # runs Linux; a fully green Linux pipeline proves nothing about macOS host reads (the Windows
  # disk-binding bug survived exactly such a pipeline). These two jobs run the module suite directly
  # on a real macOS host and in a nested cgroup-v2 container. There is deliberately no permanent
  # Windows job; verify Windows on demand via workflow_dispatch of a branch that adds one.
  # Skipped on the mode=custom eval escape hatch, same as build.
  machine-stats-macos:
    needs: prep
    if: ${{ needs.prep.outputs.mode != 'custom' }}
    runs-on: macos-latest
    timeout-minutes: 60
    env:
      JAVA_OPTS: '-Xmx4G -Xss10M -XX:MaxMetaspaceSize=512M -XX:ReservedCodeCacheSize=128M -Dfile.encoding=UTF-8'
      JVM_OPTS:  '-Xmx4G -Xss10M -XX:MaxMetaspaceSize=512M -XX:ReservedCodeCacheSize=128M -Dfile.encoding=UTF-8'
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0
      - uses: ./.github/actions/setup
        with:
          os: macos-arm64
          target: JVM
      - name: test kyo-stats-machine (macOS host)
        shell: bash
        run: sbt "kyo-stats-machineJVM/test"

  # Runs inside a privileged container with a private cgroup namespace so /proc/self/mountinfo and
  # /proc/self/cgroup present a nested cgroup-v2 layout mounted away from the host root, exercising
  # LinuxCgroup's mountinfo-based root resolution. The setup composite is not
  # reused here: its rootless-podman / loginctl steps do not run in a bare container, so JDK + sbt are
  # provisioned directly. The ubuntu-latest HOST cgroup-v2 path is already covered by the build job's
  # kyo-stats-machineJVM/test run.
  machine-stats-linux-cgroup:
    needs: prep
    if: ${{ needs.prep.outputs.mode != 'custom' }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    container:
      image: ubuntu:24.04
      options: --privileged --cgroupns=private
    env:
      JAVA_OPTS: '-Xmx4G -Xss10M -XX:MaxMetaspaceSize=512M -XX:ReservedCodeCacheSize=128M -Dfile.encoding=UTF-8'
      JVM_OPTS:  '-Xmx4G -Xss10M -XX:MaxMetaspaceSize=512M -XX:ReservedCodeCacheSize=128M -Dfile.encoding=UTF-8'
    steps:
      - name: Install base tools
        shell: bash
        run: |
          apt-get update
          apt-get install -y --no-install-recommends git curl ca-certificates build-essential
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0
      - uses: coursier/setup-action@v3.0.0
        with:
          jvm: corretto:25
          apps: sbt
      - name: Verify cgroup v2 and test kyo-stats-machine (nested cgroup container)
        shell: bash
        run: |
          # Confirm the job really sees a cgroup-v2 hierarchy before trusting the run.
          mount | grep -E 'cgroup2|cgroup' || true
          cat /proc/self/cgroup || true
          sbt "kyo-stats-machineJVM/test"

  custom:
    needs: prep
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.mode == 'custom' }}
    timeout-minutes: 180
    runs-on: ubuntu-latest
    env:
      SBT_TASK_LIMIT: 1
      JAVA_OPTS: '-Xmx12G -Xss10M -XX:+UseG1GC -XX:+UseCompactObjectHeaders -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=256M -Dfile.encoding=UTF-8'
      JVM_OPTS:  '-Xmx12G -Xss10M -XX:+UseG1GC -XX:+UseCompactObjectHeaders -XX:MaxMetaspaceSize=2G -XX:ReservedCodeCacheSize=256M -Dfile.encoding=UTF-8'
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          ref: ${{ inputs.ref || github.ref }}
          fetch-depth: 0
      - uses: ./.github/actions/setup
        with:
          os: linux-x64
          target: JVM
      - name: Run command
        shell: bash
        env:
          RUN_COMMAND: ${{ inputs.command }}
        run: |
          echo "+ $RUN_COMMAND"
          eval "$RUN_COMMAND"
