name: setup
description: >-
  Provision a kyo build job: JDK + sbt (coursier), the coursier and kyo-browser
  caches under one key namespace, and conditional Node, native libraries, and
  rootless podman. Each conditional step is derived from os and target alone;
  the caller passes no provisioning flags. Checkout is the caller's responsibility.
inputs:
  os:
    description: 'Target os/arch identifier (e.g. linux-x64, linux-arm64).'
    required: true
  target:
    description: 'Platform target: JVM, JS, Native, or Wasm.'
    required: true
runs:
  using: composite
  steps:
    - uses: actions/setup-node@v6.4.0
      if: ${{ inputs.target == 'JS' || inputs.target == 'Wasm' }}
      with:
        node-version: '24'

    - uses: actions/cache@v5
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      with:
        path: |
          ~/.cache/coursier
          ~/Library/Caches/Coursier
          ~/AppData/Local/Coursier/Cache
          ~/.sbt
          ~/.ivy2/cache
        key: deps-${{ inputs.os }}-${{ hashFiles('build.sbt', 'project/build.properties', 'project/plugins.sbt', 'project/*.scala') }}
        restore-keys: deps-${{ inputs.os }}-

    - uses: actions/cache@v5
      with:
        path: |
          ~/.cache/kyo-browser
          ~/Library/Caches/kyo-browser
          ~/AppData/Local/kyo-browser
        key: kyo-browser-${{ inputs.os }}-${{ hashFiles('kyo-browser/shared/src/main/scala/kyo/Browser.scala', 'kyo-browser/shared/src/main/scala/kyo/internal/ChromeDownloader.scala') }}
        restore-keys: kyo-browser-${{ inputs.os }}-

    - name: Install native dependencies (Linux)
      if: ${{ inputs.target == 'Native' && contains(inputs.os, 'linux') }}
      uses: nick-fields/retry@v4
      with:
        max_attempts: 3
        timeout_minutes: 5
        retry_wait_seconds: 15
        command: |
          sudo apt-get update
          sudo apt-get install -y -o Acquire::Retries=3 libcurl4-openssl-dev libidn2-dev libh2o-evloop-dev=2.2.5+dfsg2-8.1ubuntu3

    - name: Install podman (Linux)
      if: ${{ contains(inputs.os, 'linux') }}
      uses: nick-fields/retry@v4
      with:
        max_attempts: 3
        timeout_minutes: 5
        retry_wait_seconds: 15
        command: |
          sudo apt-get update
          sudo apt-get install -y -o Acquire::Retries=3 podman uidmap

    - name: Start podman (Linux)
      if: ${{ contains(inputs.os, 'linux') }}
      shell: bash
      run: |
        uid="$(id -u)"
        sudo loginctl enable-linger "$uid"
        for _ in $(seq 1 20); do
          [ -d "/run/user/$uid" ] && break
          sleep 1
        done
        if [ ! -d "/run/user/$uid" ]; then
          echo "user runtime dir /run/user/$uid did not come up within 20s" >&2
          exit 1
        fi
        export XDG_RUNTIME_DIR="/run/user/$uid"
        mkdir -p "$XDG_RUNTIME_DIR/podman"
        nohup podman system service --time=0 \
          "unix://$XDG_RUNTIME_DIR/podman/podman.sock" \
          > /tmp/podman.log 2>&1 &
        for _ in $(seq 1 10); do
          [ -S "$XDG_RUNTIME_DIR/podman/podman.sock" ] && break
          sleep 1
        done
        if [ ! -S "$XDG_RUNTIME_DIR/podman/podman.sock" ]; then
          echo "podman API socket did not come up within 10s" >&2
          cat /tmp/podman.log >&2
          exit 1
        fi
        echo "XDG_RUNTIME_DIR=$XDG_RUNTIME_DIR" >> "$GITHUB_ENV"
        podman info | grep -iE 'cgroup|rootless' || true
        podman version
        docker version

    - uses: coursier/setup-action@v3.0.0
      with:
        jvm: corretto:24
        apps: sbt
