name: setup
description: >-
  Provision a kyo build job: JDK + sbt (coursier), the coursier and kyo-browser
  caches under one key namespace, and conditional Node, native libraries, and
  rootless podman. Each conditional step is derived from os and target alone;
  the caller passes no provisioning flags. Checkout is the caller's responsibility.
inputs:
  os:
    description: 'Target os/arch identifier (e.g. linux-x64, linux-arm64).'
    required: true
  target:
    description: 'Platform target: JVM, JS, Native, or Wasm.'
    required: true
runs:
  using: composite
  steps:
    - uses: actions/setup-node@v6.4.0
      if: ${{ inputs.target == 'JS' || inputs.target == 'Wasm' }}
      with:
        node-version: '24'

    - uses: actions/cache@v5
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      with:
        path: |
          ~/.cache/coursier
          ~/Library/Caches/Coursier
          ~/AppData/Local/Coursier/Cache
          ~/.sbt
          ~/.ivy2/cache
        key: deps-${{ inputs.os }}-${{ hashFiles('build.sbt', 'project/build.properties', 'project/plugins.sbt', 'project/*.scala') }}
        restore-keys: deps-${{ inputs.os }}-

    - uses: actions/cache@v5
      with:
        path: |
          ~/.cache/kyo-browser
          ~/Library/Caches/kyo-browser
          ~/AppData/Local/kyo-browser
        key: kyo-browser-${{ inputs.os }}-${{ hashFiles('kyo-browser/shared/src/main/scala/kyo/Browser.scala', 'kyo-browser/shared/src/main/scala/kyo/internal/ChromeDownloader.scala') }}
        restore-keys: kyo-browser-${{ inputs.os }}-

    - name: Add supplementary swap (Linux)
      if: ${{ contains(inputs.os, 'linux') }}
      shell: bash
      run: |
        # The Native link phase can overcommit the 16GB runner (a large sbt driver heap plus
        # forked clang jobs), and the stock runner swap has been observed fully exhausted right
        # before kernel OOM kills. Extra swap turns a marginal overcommit into slowdown instead
        # of a SIGKILL. Best-effort: a runner that cannot host the file keeps its stock swap.
        for dir in /mnt "${RUNNER_TEMP:-/tmp}"; do
          swapfile="$dir/kyo-swapfile"
          if sudo fallocate -l 8G "$swapfile" 2>/dev/null \
             && sudo chmod 600 "$swapfile" \
             && sudo mkswap "$swapfile" >/dev/null 2>&1 \
             && sudo swapon "$swapfile" 2>/dev/null; then
            echo "supplementary swap active at $swapfile"
            free -m | awk 'NR==1 || /Swap/'
            exit 0
          fi
          sudo rm -f "$swapfile" 2>/dev/null || true
        done
        echo "warning: could not add supplementary swap; continuing with stock swap only"

    - name: Install native dependencies (Linux)
      if: ${{ inputs.target == 'Native' && contains(inputs.os, 'linux') }}
      uses: nick-fields/retry@v4
      with:
        max_attempts: 3
        timeout_minutes: 5
        retry_wait_seconds: 15
        command: |
          sudo apt-get update
          sudo apt-get install -y -o Acquire::Retries=3 libcurl4-openssl-dev libidn2-dev libh2o-evloop-dev=2.2.5+dfsg2-8.1ubuntu3

    - name: Install podman (Linux)
      if: ${{ contains(inputs.os, 'linux') }}
      uses: nick-fields/retry@v4
      with:
        max_attempts: 3
        timeout_minutes: 5
        retry_wait_seconds: 15
        command: |
          sudo apt-get update
          sudo apt-get install -y -o Acquire::Retries=3 podman uidmap

    - name: Start podman (Linux)
      if: ${{ contains(inputs.os, 'linux') }}
      shell: bash
      run: |
        uid="$(id -u)"
        sudo loginctl enable-linger "$uid"
        for _ in $(seq 1 20); do
          [ -d "/run/user/$uid" ] && break
          sleep 1
        done
        if [ ! -d "/run/user/$uid" ]; then
          echo "user runtime dir /run/user/$uid did not come up within 20s" >&2
          exit 1
        fi
        export XDG_RUNTIME_DIR="/run/user/$uid"
        mkdir -p "$XDG_RUNTIME_DIR/podman"
        sock="$XDG_RUNTIME_DIR/podman/podman.sock"
        # The rootless podman API socket can take well over 10s to appear on a loaded runner. Retry the
        # service start a few times, each with a generous wait, instead of failing on the first slow start.
        up=""
        for attempt in 1 2 3; do
          pkill -u "$uid" -f "podman system service" 2>/dev/null || true
          rm -f "$sock"
          nohup podman system service --time=0 "unix://$sock" > /tmp/podman.log 2>&1 &
          for _ in $(seq 1 30); do
            [ -S "$sock" ] && { up=1; break; }
            sleep 1
          done
          [ -n "$up" ] && break
          echo "podman API socket did not come up within 30s (attempt $attempt of 3)" >&2
          cat /tmp/podman.log >&2
        done
        if [ -z "$up" ]; then
          echo "podman API socket did not come up after 3 attempts" >&2
          exit 1
        fi
        echo "XDG_RUNTIME_DIR=$XDG_RUNTIME_DIR" >> "$GITHUB_ENV"
        podman info | grep -iE 'cgroup|rootless' || true
        podman version
        docker version

    - uses: coursier/setup-action@v3.0.0
      with:
        jvm: corretto:25
        apps: sbt
